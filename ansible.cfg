[defaults]
# become(sudo) は local.yml で become: no としてグローバル無効化。
# Cask の sudo は brew-cask role の独自プロンプトで個別に処理するため、
# ask_sudo_pass / become_ask_pass は使用しない（ask_sudo_pass は新しい
# Ansible で削除済みのため記述するとエラーになる）。
# Python interpreter はインベントリ(hosts)で auto_silent を指定済み。

[privilege_escalation]
#become_ask_pass = True
