      # for php
      #- homebrew/php
      # for heroku (untrusted tap かつ heroku formula 未使用のため廃止。必要時は homebrew/core の heroku を利用)
      #- heroku/brew
      # for wxmac
      #- homebrew/core
    # === untrusted/未使用tapの掃除(冪等: 対象が無ければ no-op) ===
    # 最近のHomebrewは untrusted tap からの formula ロードを拒否し、brew update も失敗する。
    # untap(--force)は formula をロードしないため trust に関係なく成功するので、
    # 「先に強制untap → その後 formula を uninstall」の順で処理する(順序が逆だと拒否される)。
    # (1) 除去する未使用/untrusted tap
    brew_repos_absent:
      - go-task/tap    # go-task 本体は保持し tap のみ除去(下の formula 削除に含めない)
      - heroku/brew    # heroku formula は廃止(必要時は homebrew/core を利用)
      - kayac/tap      # ecspresso 用。未使用のため廃止
      - osx-cross/avr  # avr ツールチェイン用。廃止
      - sanemat/font   # Ricty 用。HackGen Nerd(cask) へ移行済み
    # (2) untap後に削除する不要formula(tapが消えるので untrusted 拒否を回避できる)
    brew_formulae_absent:
      - ricty          # sanemat/font。HackGen Nerd(cask) へ移行済み
      - avr-gcc@9      # osx-cross/avr。ergodox/avr ツールチェイン。廃止
      - avr-binutils   # osx-cross/avr。同上
    brew_packs:
      # for languages
      - { name: asdf, state: latest }
      - { name: roswell, state: latest }
      - { name: gpg, state: latest }
      #- { name: v8 }
      #- { name: gauche }
      #- { name: composer }
      # for erlang compile
      # - { name: wxmac, state: absent }
      - { name: wxwidgets } # rename from wxmac
      - { name: fop }
      - { name: unixodbc, state: latest }
      # for java compile
      #- { name: ant }
      # for k8s
      - { name: kubernetes-cli }
      - { name: kube-ps1 }
      - { name: kubectx, state: absent }
      - { name: stern, state: absent }
      - { name: cfssl } # for k8s-the-hard-way
      # for aws
      - { name: awscli, state: absent }
      - { name: s3cmd, state: absent }
      - { name: aws-iam-authenticator, state: absent }
      #- { name: kayac/tap/ecspresso }
      # for heroku
      #- { name: heroku }
      # for docker
      #- { name: docker, state: absent }
      #- { name: docker-completion, state: absent }
      #- { name: docker-compose, state: absent }
      #- { name: unison }
      #- { name: fswatch }
      #- { name: rsync }
      #- { name: fsevent_watch }
      #- { name: fsevents-tools }
      # for bigdata
      #- { name: apache-spark }
      #- { name: kafka }
      #- { name: embulk }
      # for font
      - { name: fontforge, state: absent } # move to cask
      #- { name: ricty } # 廃止: untrusted tap(sanemat/font)かつ未メンテのビルド依存で壊れやすい。cask の font-hackgen-nerd へ移行
      # for libs
      #- { name: openssl }
      #- { name: libffi }
      # for books
      #- { name: ghostscript }
      # for life
      - { name: tmux }
      - { name: neovim }
      - { name: jq, state: latest }
      - { name: htop, state: absent }
      - { name: bpytop, state: latest }
      #- { name: coreutils }
      #- { name: gnupg }
      - { name: zsh }
      - { name: git }
