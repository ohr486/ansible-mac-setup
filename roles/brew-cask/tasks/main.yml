- name: check whether brew cask packages need sudo password
  set_fact:
    brew_cask_requires_sudo_password: "{{ brew_cask_packs | default([], true) | selectattr('requires_sudo', 'defined') | selectattr('requires_sudo') | list | length > 0 }}"
  when: brew_cask_packs | default([], true) | length > 0

- name: ask sudo password for brew cask packages
  pause:
    prompt: "Homebrew Cask の操作に sudo パスワードが必要です（スキップする場合は Enter）"
    echo: false
  register: brew_cask_sudo_password_prompt
  no_log: true
  when:
    - brew_cask_requires_sudo_password | default(false)
    - brew_cask_sudo_password is not defined

- name: set sudo password for brew cask packages
  set_fact:
    brew_cask_effective_sudo_password: "{{ brew_cask_sudo_password | default(brew_cask_sudo_password_prompt.user_input | default(''), true) }}"
  no_log: true
  when: brew_cask_requires_sudo_password | default(false)

- name: install/upgrade brew cask packages
  homebrew_cask:
    name: "{{ item.name | default(item) }}"
    state: "{{ item.state | default('present') }}"
    install_options: "{{ item.install_options | default(omit) }}"
    sudo_password: "{{ (item.requires_sudo | default(false) and (brew_cask_effective_sudo_password | default('') | length > 0)) | ternary(brew_cask_effective_sudo_password | default(''), omit) }}"
  with_items: '{{ brew_cask_packs | default([], true) }}'
  when: brew_cask_packs | default([], true) | length > 0
